<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio</title>
  <meta name="description" content="Award-winning modern portoflio showcasing creative interaction model.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Loader Sequence -->
  <div id="loader">
    <div class="loader-text">
      <span>Loading</span>
      <span class="loader-percentage">0%</span>
    </div>
  </div>

  <!-- Spatial Navigation -->
  <nav id="main-nav">
    <div class="nav-brand">N.</div>
    <button class="nav-toggle">
      <span class="line"></span>
      <span class="line"></span>
    </button>
  </nav>

  <div class="nav-overlay">
    <ul class="nav-links">
      <li><a href="#hero">Home</a></li>
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>

  <!-- Main Content Canvas -->
  <main id="canvas">
    <!-- Hero Section -->
    <section id="hero" class="section-hero">
      <h1 class="hero-title">
        <span class="line-wrap"><span class="line-inner">Creative</span></span>
        <span class="line-wrap"><span class="line-inner">Director</span></span>
        <span class="line-wrap"><span class="line-inner">&amp; Engineer</span></span>
      </h1>
      <p class="hero-subtitle">Crafting spatial digital experiences.</p>
      <div class="scroll-indicator">Scroll to explore</div>
    </section>
      <!-- Work Section -->
    <section id="work" class="section-work">
      <div class="section-header">
        <h2>Selected Work</h2>
      </div>
    </section>
      <!-- About Section -->
    <section id="about" class="section-about">
      <h2 class="bg-text">ABOUT</h2>
      <div class="about-content">
        <p class="reveal-text">I blend creative direction with engineering to build digital environments that feel alive.</p>
      </div>
    </section>
  </main>

  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/navigation.js"></script>
</body>
</html>
