<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naveenraj | Developer Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 3D Canvas -->
    <canvas id="webgl"></canvas>

    <!-- Loading Screen -->
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Initializing Hub...</p>
    </div>

    <!-- UI Overlay (Modals) -->
    <div id="modal-container" class="modal-container">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <div id="modal-body">
                <!-- Dynamic Content Goes Here -->
            </div>
        </div>
    </div>

    <!-- Instructions -->
    <div id="instructions" class="instructions">
        <p>Click objects to explore</p>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
