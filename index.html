<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naveenraj | Software Developer Portfolio</title>
  <meta name="description" content="Modern software developer portfolio showcasing projects, experience, and contact information.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Loader Sequence -->
  <div id="loader">
    <div class="loader-text">
      <span>Loading</span>
      <span class="loader-percentage">0%</span>
    </div>
  </div>

  <!-- Spatial Navigation -->
  <nav id="main-nav" aria-label="Main Navigation">
    <div class="nav-brand" id="nav-brand-text">N.</div>
    <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation menu">
      <span class="line"></span>
      <span class="line"></span>
    </button>
  </nav>

  <div class="nav-overlay">
    <ul class="nav-links" id="dynamic-nav">
      <!-- Injected by JS -->
    </ul>
  </div>

  <!-- Main Content Canvas -->
  <main id="canvas">
    <!-- Hero Section -->
    <section id="hero" class="section-hero">
      <p id="hero-greeting" class="hero-subtitle"></p>
      <h1 class="hero-title" id="hero-title-container">
        <!-- Injected by JS -->
      </h1>
      <p class="hero-subtitle" id="hero-description"></p>
      <div class="scroll-indicator"><a id="hero-cta" href="#about">Scroll to explore</a></div>
    </section>

    <!-- About Section -->
    <section id="about" class="section-about" aria-label="About Me">
      <h2 class="bg-text" id="about-bg-text">STORY</h2>
      <div class="about-content">
        <div id="about-paragraphs"></div>
        <div class="skills-grid" id="about-skills"></div>
      </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="section-experience" aria-label="Experience">
      <div class="section-header section-header-center">
        <h2>Experience</h2>
      </div>
      <div class="experience-list" id="experience-container">
        <!-- Injected by JS -->
      </div>
    </section>

    <!-- Work Section (Projects) -->
    <section id="projects" class="section-work" aria-labelledby="work-heading">
      <div class="section-header">
        <h2 id="work-heading">Creation</h2>
      </div>
      <div class="work-grid" id="projects-grid">
        <!-- Injected by JS -->
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section-contact" aria-label="Contact Information">
      <div class="contact-wrapper">
        <h2 class="contact-title" id="contact-title">Connect</h2>
        <p id="contact-subtitle"></p>
        <div id="contact-info-list"></div>
        <div id="contact-social-list"></div>
      </div>
      <footer class="site-footer">
        <div class="footer-left">© 2026. <span id="footer-name"></span>.</div>
      </footer>
    </section>
  </main>

  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/navigation.js"></script>
</body>
</html>
